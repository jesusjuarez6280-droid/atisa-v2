<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERP Atisa{% endblock %}</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/remixicon.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}">
    
    <script src="{{ url_for('static', filename='js/tailwind.js') }}"></script>
</head>
<body>
    <div id="root">
        <div class="flex min-h-screen bg-[#f4f6fb]" style="font-family: Inter, sans-serif;">
            
            <aside class="fixed left-0 top-0 h-screen w-[280px] bg-[#0f2744] flex flex-col z-50 select-none">
                <div class="flex items-center justify-center px-6 py-8 border-b border-white/10">
                    <img alt="Logo ERP Industrial" class="h-12 object-contain" src="{{ url_for('static', filename='img_sistema/logo.png') }}">
                </div>
                
                <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
                    <a href="/dashboard" class="w-full flex items-center gap-4 px-5 py-4 rounded-xl text-left transition-all duration-200 cursor-pointer whitespace-nowrap {% if request.path == '/dashboard' %}bg-[#1e6fd9]/30 text-white border-l-4 border-[#3b9eff]{% else %}text-white/60 hover:bg-white/8 hover:text-white/90 border-l-4 border-transparent{% endif %}">
                        <div class="w-6 h-6 flex items-center justify-center"><i class="ri-dashboard-3-line text-xl"></i></div>
                        <span class="text-[17px] font-medium">Dashboard</span>
                    </a>
                    <a href="/recetas" class="w-full flex items-center gap-4 px-5 py-4 rounded-xl text-left transition-all duration-200 cursor-pointer whitespace-nowrap {% if request.path == '/recetas' %}bg-[#1e6fd9]/30 text-white border-l-4 border-[#3b9eff]{% else %}text-white/60 hover:bg-white/8 hover:text-white/90 border-l-4 border-transparent{% endif %}">
                        <div class="w-6 h-6 flex items-center justify-center"><i class="ri-list-check-3 text-xl"></i></div>
                        <span class="text-[17px] font-medium">Recetas</span>
                    </a>
                    <a href="/empleados" class="w-full flex items-center gap-4 px-5 py-4 rounded-xl text-left transition-all duration-200 cursor-pointer whitespace-nowrap {% if request.path == '/empleados' %}bg-[#1e6fd9]/30 text-white border-l-4 border-[#3b9eff]{% else %}text-white/60 hover:bg-white/8 hover:text-white/90 border-l-4 border-transparent{% endif %}">
                        <div class="w-6 h-6 flex items-center justify-center"><i class="ri-group-line text-xl"></i></div>
                        <span class="text-[17px] font-medium">Empleados</span>
                    </a>
                    <a href="/documentos" class="w-full flex items-center gap-4 px-5 py-4 rounded-xl text-left transition-all duration-200 cursor-pointer whitespace-nowrap {% if request.path == '/documentos' %}bg-[#1e6fd9]/30 text-white border-l-4 border-[#3b9eff]{% else %}text-white/60 hover:bg-white/8 hover:text-white/90 border-l-4 border-transparent{% endif %}">
                        <div class="w-6 h-6 flex items-center justify-center"><i class="ri-folder-open-line text-xl"></i></div>
                        <span class="text-[17px] font-medium">Documentos</span>
                    </a>
                    <a href="/reportes" class="w-full flex items-center gap-4 px-5 py-4 rounded-xl text-left transition-all duration-200 cursor-pointer whitespace-nowrap {% if request.path == '/reportes' %}bg-[#1e6fd9]/30 text-white border-l-4 border-[#3b9eff]{% else %}text-white/60 hover:bg-white/8 hover:text-white/90 border-l-4 border-transparent{% endif %}">
                        <div class="w-6 h-6 flex items-center justify-center"><i class="ri-bar-chart-2-line text-xl"></i></div>
                        <span class="text-[17px] font-medium">Reportes</span>
                    </a>
                    <a href="/activos" class="w-full flex items-center gap-4 px-5 py-4 rounded-xl text-left transition-all duration-200 cursor-pointer whitespace-nowrap {% if request.path == '/activos' %}bg-[#1e6fd9]/30 text-white border-l-4 border-[#3b9eff]{% else %}text-white/60 hover:bg-white/8 hover:text-white/90 border-l-4 border-transparent{% endif %}">
                        <div class="w-6 h-6 flex items-center justify-center"><i class="ri-shield-check-line text-xl"></i></div>
                        <span class="text-[17px] font-medium">Activos y EPP</span>
                    </a>
                    <a href="/gasolina" class="w-full flex items-center gap-4 px-5 py-4 rounded-xl text-left transition-all duration-200 cursor-pointer whitespace-nowrap {% if request.path == '/gasolina' %}bg-[#1e6fd9]/30 text-white border-l-4 border-[#3b9eff]{% else %}text-white/60 hover:bg-white/8 hover:text-white/90 border-l-4 border-transparent{% endif %}">
                        <div class="w-6 h-6 flex items-center justify-center"><i class="ri-gas-station-fill text-xl"></i></div>
                        <span class="text-[17px] font-medium">Tarjeta Gasolina</span>
                    </a>
                    <a href="/configuracion" class="w-full flex items-center gap-4 px-5 py-4 rounded-xl text-left transition-all duration-200 cursor-pointer whitespace-nowrap {% if request.path == '/configuracion' %}bg-[#1e6fd9]/30 text-white border-l-4 border-[#3b9eff]{% else %}text-white/60 hover:bg-white/8 hover:text-white/90 border-l-4 border-transparent{% endif %}">
                        <div class="w-6 h-6 flex items-center justify-center"><i class="ri-settings-4-line text-xl"></i></div>
                        <span class="text-[17px] font-medium">Configuración</span>
                    </a>
                </nav>
                
                <div class="px-4 py-5 border-t border-white/10">
                    <div class="flex items-center gap-3 px-3 py-3 rounded-xl bg-white/5">
                        <div class="w-10 h-10 flex items-center justify-center rounded-full bg-[#1e6fd9] text-white font-bold text-sm shrink-0 uppercase">
                            {{ session.get('nombre', 'U')[0] }}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-white text-sm font-semibold truncate">{{ session.get('nombre', 'Usuario') }}</p>
                            <p class="text-white/50 text-xs truncate uppercase">{{ session.get('rol', 'Colaborador') }}</p>
                        </div>
                        <a href="/logout" class="w-8 h-8 flex items-center justify-center text-white/40 hover:text-rose-400 transition-colors cursor-pointer" title="Cerrar sesión">
                            <i class="ri-logout-box-r-line text-lg"></i>
                        </a>
                    </div>
                </div>
            </aside>

            <main class="flex-1 ml-[280px] flex flex-col min-h-screen">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
